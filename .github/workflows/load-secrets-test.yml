name: test-load-secrets-action (service-account + connect)

on:
  pull_request:
  workflow_dispatch:

jobs:
  test_service_account:
    name: Service Account
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Load secret (service account)
        id: load_secrets
        uses: 1Password/load-secrets-action@jill/rebuild-dist
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SECRET: ${{ secrets.OP_SECRET_REF }}

      - name: Assert output is present (masked in logs)
        shell: bash
        run: |
          if [ -z "${{ steps.load_secrets.outputs.SECRET }}" ]; then
            echo "SECRET output is empty (service account)"
            exit 1
          fi
          echo "SECRET output is set (service account)"

  test_connect:
    name: Connect
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Load secret (connect)
        id: load_secrets
        uses: 1Password/load-secrets-action@jill/rebuild-dist
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          SECRET: ${{ secrets.OP_SECRET_REF }}

      - name: Assert output is present (masked in logs)
        shell: bash
        run: |
          if [ -z "${{ steps.load_secrets.outputs.SECRET }}" ]; then
            echo "SECRET output is empty (connect)"
            exit 1
          fi
          echo "SECRET output is set (connect)"
