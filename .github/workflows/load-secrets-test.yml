name: test-load-secrets-action-pr137 (output)
on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Load secret (from load-secrets-action PR 137)
        id: load_secrets
        uses: 1Password/load-secrets-action@refs/pull/137/head
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SECRET: ${{ secrets.OP_SECRET_REF }}

      - name: Assert output is present (masked in logs)
        shell: bash
        run: |
          if [ -z "${{ steps.load_secrets.outputs.SECRET }}" ]; then
            echo "SECRET output is empty"
            exit 1
          fi
          echo "SECRET output is set (should be masked): ${{ steps.load_secrets.outputs.SECRET }}"
